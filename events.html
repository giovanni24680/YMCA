<!DOCTYPE html>

<head>

    <meta name="theme-color" content="#1a1210">
    <meta name="application-name" content="OULM">

    <link rel="stylesheet" href="assets/css/tokens.css">

<body data-page="events">
<a class="skip-link" href="#main">Skip to content</a>
<div class="app-stage">
<div class="app-stage__chrome" aria-hidden="true"><span class="app-stage__dots"><i></i><i></i></span></div>
<div class="app">
    <header class="app-bar">
        <a href="homebase.html" class="app-bar__logo-link" aria-label="OULM Homebase">
            <img src="assets/OULM.svg" alt="" width="100" height="28" decoding="async">
        </a>
        <h1 class="app-bar__title">Events</h1>
    </header>

    <main class="screen" id="main">
        <div class="filter-bar" data-filter-group data-filter-target=".event-card" data-filter-default="all">

            <button class="filter-pill" type="button" data-filter-value="Hertfordshire">Herts</button>
            <button class="filter-pill" type="button" data-filter-value="Bedfordshire">Beds</button>
            <button class="filter-pill" type="button" data-filter-value="Buckinghamshire">Bucks</button>
            <button class="filter-pill" type="button" data-filter-value="Food">Food</button>
            <button class="filter-pill" type="button" data-filter-value="Build">Build</button>
            <button class="filter-pill" type="button" data-filter-value="Film">Film</button>
        </div>

        <div class="events-list" id="events-list"></div>
    </main>

    <nav class="tab-bar" aria-label="Main">
        <a href="homebase.html" class="tab-bar__item" data-tab="homebase">
            <svg class="tab-bar__icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

        <a href="events.html" class="tab-bar__item" data-tab="events">
            <svg class="tab-bar__icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span class="tab-bar__label">Events</span>
        </a>
        <a href="map.html" class="tab-bar__item" data-tab="map">
            <svg class="tab-bar__icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>

            <svg class="tab-bar__icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>

        </a>
        <a href="progress.html" class="tab-bar__item" data-tab="progress">
            <svg class="tab-bar__icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
