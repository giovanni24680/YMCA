<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Oulm — Onboarding</title>
    <link rel="stylesheet" href="assets/css/tokens.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
</head>
<body data-page="onboarding">
<a class="skip-link" href="#main">Skip to content</a>
<div class="app">
    <header class="app-bar app-bar--sub">
        <a href="events.html" class="app-bar__back" aria-label="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <h1 class="app-bar__title">Onboarding</h1>
    </header>

    <main class="screen" id="main">
        <section class="screen__section">
            <div class="stack">
                <h2>Quick picks and soft cohort shaping.</h2>
                <p class="lede">Playful pick clusters instead of endless dropdowns.</p>
            </div>
        </section>

        <section class="screen__section">
            <form class="form-grid" id="onboarding-form">
                <div class="form-grid form-grid--two">
                    <div class="field">
                        <label for="display-name">Display name</label>
                        <input id="display-name" name="displayName" type="text" placeholder="How should Oulm refer to you?">
                    </div>
                    <div class="field">
                        <label for="age-band">Age band</label>
                        <select id="age-band" name="ageBand">
                            <option value="14-17">14-17</option>
                            <option value="18-21">18-21</option>
                            <option value="22-25">22-25</option>
                            <option value="26+">26+</option>
                        </select>
                    </div>
                </div>
                <div class="field">
                    <label for="entry-style">Preferred way to enter</label>
                    <select id="entry-style" name="entryStyle">
                        <option value="Food-first">Food-first</option>
                        <option value="Shared interest">Shared interest</option>
                        <option value="Bring a friend">Bring a friend</option>
                        <option value="Small host-led intro">Small host-led intro</option>
                    </select>
                </div>
                <div id="onboarding-clusters" class="stack"></div>
            </form>
        </section>

        <div id="onboarding-suggestions" class="screen__pad">
            <div class="empty-state">Save picks to see suggested circles.</div>
        </div>
    </main>

    <div class="action-bar">
        <button class="button--bronze button button--lg" type="button" data-onboarding-save>Save picks</button>
        <a class="button--ghost" href="progress.html">Progress</a>
    </div>

    <nav class="tab-bar" aria-label="Main">
        <a href="homebase.html" class="tab-bar__item" data-tab="homebase">
            <svg class="tab-bar__icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="tab-bar__label">Home</span>
        </a>
        <a href="events.html" class="tab-bar__item" data-tab="events">
            <svg class="tab-bar__icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span class="tab-bar__label">Events</span>
        </a>
        <a href="map.html" class="tab-bar__item" data-tab="map">
            <svg class="tab-bar__icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span class="tab-bar__label">Map</span>
        </a>
        <a href="host.html" class="tab-bar__item" data-tab="host">
            <svg class="tab-bar__icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            <span class="tab-bar__label">Host</span>
        </a>
        <a href="progress.html" class="tab-bar__item" data-tab="progress">
            <svg class="tab-bar__icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <span class="tab-bar__label">Progress</span>
        </a>
    </nav>
</div>
<script type="module" src="assets/js/app.js"></script>
</body>
</html>
