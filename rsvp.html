<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="OULM by One YMCA — Woodland Café, Leavesden, youth community across Hertfordshire, Bedfordshire, and Buckinghamshire.">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#1a1210">
    <meta name="application-name" content="OULM">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="OULM">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
    <title>OULM — Soft RSVP</title>
    <link rel="stylesheet" href="assets/css/tokens.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/transitions.css">
    <link rel="stylesheet" href="assets/css/pages/events.css">
</head>
<body data-page="rsvp">
<a class="skip-link" href="#main">Skip to content</a>
<div class="app-stage">
<div class="app">
    <header class="app-bar app-bar--sub app-bar--with-back">
        <a href="events.html" class="app-bar__back" aria-label="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <a href="homebase.html" class="app-bar__logo-link app-bar__logo-link--sm" aria-label="OULM Homebase">
            <span class="brand-mark brand-mark--oulm" aria-hidden="true"></span>
        </a>
        <h1 class="app-bar__title">Soft RSVP</h1>
    </header>

    <main class="screen" id="main">
        <section class="screen__section" id="rsvp-summary"></section>

        <section class="screen__section">
            <div class="stack">
                <span class="eyebrow">Soft RSVP intent</span>
                <p style="color:var(--color-ink-muted);font-size:var(--step--1)">A low-stakes digital signal — not a locked-in calendar hold.</p>
                <div class="selection-grid">
                    <button class="choice-chip" type="button" data-intent="rsvp">I&apos;m leaning in</button>
                    <button class="choice-chip" type="button" data-intent="show-up">Likely show up</button>
                    <button class="choice-chip" type="button" data-intent="maybe">Still deciding</button>
                </div>
            </div>
        </section>

        <section class="screen__section">
            <div class="stack">
                <span class="eyebrow">How many people?</span>
                <div class="selection-grid">
                    <button class="choice-chip" type="button" data-guest-count="1">1</button>
                    <button class="choice-chip" type="button" data-guest-count="2">2</button>
                    <button class="choice-chip" type="button" data-guest-count="3">3</button>
                    <button class="choice-chip" type="button" data-guest-count="4">4</button>
                </div>
            </div>
        </section>

        <section class="screen__section">
            <div class="field">
                <label for="arrival-note">Arrival note (optional)</label>
                <textarea id="arrival-note" placeholder="Coming solo, arriving late, first time, anxious about showing up..."></textarea>
            </div>
        </section>

        <section class="screen__section">
            <div class="stack">
                <span class="eyebrow">Account scaffold</span>
                <p style="color:var(--color-ink-muted);font-size:var(--step--1)">Choose a route to continue later. Saves locally.</p>
                <div class="selection-grid">
                    <button class="choice-chip" type="button" data-account-method="magic-link">Magic link</button>
                    <button class="choice-chip" type="button" data-account-method="oauth">OAuth</button>
                    <button class="choice-chip" type="button" data-account-method="edu-sso">Edu SSO</button>
                    <button class="choice-chip" type="button" data-account-method="email">Email</button>
                    <button class="choice-chip" type="button" data-account-method="phone">Phone</button>
                </div>
            </div>
        </section>

        <div id="rsvp-feedback" class="screen__pad empty-state">Nothing saved yet.</div>
        <div id="rsvp-matchmaking" class="matchmaking-panel" hidden></div>
    </main>

    <div class="action-bar">
        <button class="button--bronze button button--lg" type="button" data-rsvp-submit>Send soft RSVP</button>
        <a class="button--ghost" href="onboarding.html">Onboarding</a>
    </div>

    <nav class="tab-bar" aria-label="Main">
        <a href="homebase.html" class="tab-bar__item" data-tab="homebase">
            <svg class="tab-bar__icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="tab-bar__label">Home</span>
        </a>
        <a href="events.html" class="tab-bar__item" data-tab="events">
            <svg class="tab-bar__icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span class="tab-bar__label">Events</span>
        </a>
        <a href="map.html" class="tab-bar__item" data-tab="map">
            <svg class="tab-bar__icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span class="tab-bar__label">Map</span>
        </a>
        <a href="host.html" class="tab-bar__item" data-tab="host">
            <svg class="tab-bar__icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            <span class="tab-bar__label">Host</span>
        </a>
        <a href="progress.html" class="tab-bar__item" data-tab="progress">
            <svg class="tab-bar__icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <span class="tab-bar__label">Progress</span>
        </a>
    </nav>
</div>
</div>
<script src="register-sw.js" defer></script>
<script type="module" src="assets/js/app.js"></script>
</body>
</html>
